services:
  - type: web
    name: digital-twin-healthcare
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22.18.0
      - key: PORT
        value: 10000 
      - key: MONGO_URI
        sync: false 
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production